<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A154B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#611F69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECB22E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2C744;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  
  <!-- Star shape -->
  <path d="M256 80 L288 200 L416 200 L312 280 L344 400 L256 320 L168 400 L200 280 L96 200 L224 200 Z" 
        fill="url(#star)" 
        stroke="rgba(255,255,255,0.3)" 
        stroke-width="2"/>
  
  <!-- Small decorative stars -->
  <g opacity="0.3">
    <circle cx="120" cy="140" r="4" fill="#FFF"/>
    <circle cx="400" cy="120" r="3" fill="#FFF"/>
    <circle cx="450" cy="320" r="5" fill="#FFF"/>
    <circle cx="80" cy="380" r="3" fill="#FFF"/>
    <circle cx="380" cy="440" r="4" fill="#FFF"/>
  </g>
  
  <!-- Sparkle dots near main star -->
  <g opacity="0.6">
    <circle cx="186" cy="140" r="3" fill="#ECB22E"/>
    <circle cx="340" cy="170" r="2" fill="#ECB22E"/>
    <circle cx="170" cy="380" r="2" fill="#ECB22E"/>
    <circle cx="350" cy="360" r="3" fill="#ECB22E"/>
  </g>
</svg>
